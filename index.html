<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Audisi Bakat</title>
    <link rel="stylesheet" href="style.css">
   
</head>

<body>

<div class="wrapper">
<div class="card">
<div class="banner"></div>
<div class="header">
FORM AUDISI BAKAT MAHASISWA ITS 2026
</div>
<div class="content">
    <form>

<label class="label">Nama Lengkap</label>
<input type="text" class="input">
<div class="spacer"></div>

<label class="label">Nama Panggung</label>
<input type="text" class="input">
<div class="spacer"></div>

<label class="label">Kategori Bakat</label>
<select class="select">
    <option>Pilih Kategori</option>
    <option>Seni</option>
    <option>Akademik & Intelektual</option>
    <option>Olahraga</option>
    <option>Hiburan</option>
    <option>Kreativitas Digital</option>
</select>
<div class="spacer"></div>

<label class="label">Pengalaman</label>
<input type="text" class="input">
<div class="spacer"></div>

<label class="label">Instagram</label>
<input type="text" class="input">
<div class="spacer"></div>

<label class="label">Link Video</label>
<input type="text" class="input">
<div class="spacer"></div>

<label class="label">Tingkat Percaya Diri</label>
<input type="range" min="1" max="10">
<div class="spacer"></div>

<label class="label">Bersedia Live?</label>
<div class="radio-group">
    <input type="radio" name="live"> Ya
    <input type="radio" name="live"> Tidak
</div>
<div class="spacer"></div>

<label class="label">Deskripsi Singkat</label><br>
<textarea rows="4"></textarea>

<input type="submit" value="KIRIM AUDISI" class="button">

        </form>

      </div>
   </div>
</div>

</body>
</html>
