<style>
  :root {
    --primary: #1f2937;
    --accent: #4f46e5;
    --bg: #ffffff;
    --text-light: #9ca3af;
  }

  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; }

  /* HEADER */
  .site-header {
    background: var(--primary);
    color: #fff;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  .header-container {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
  }
  .logo {
    font-size: 1.4rem;
    font-weight: 700;
    color: #fff;
    text-decoration: none;
    letter-spacing: .5px;
  }
  .nav-links {
    display: flex;
    gap: 28px;
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .nav-links a {
    color: #e5e7eb;
    text-decoration: none;
    font-weight: 500;
    transition: color .2s;
  }
  .nav-links a:hover { color: var(--accent); }
  .nav-toggle { display: none; flex-direction: column; gap: 4px; background: none; border: none; cursor: pointer; }
  .nav-toggle span { width: 24px; height: 2px; background: #fff; }

  @media (max-width: 768px) {
    .nav-links {
      position: absolute;
      top: 60px;
      left: 0;
      right: 0;
      background: var(--primary);
      flex-direction: column;
      align-items: center;
      gap: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height .3s ease;
    }
    .nav-links.open { max-height: 300px; padding: 10px 0; }
    .nav-links li { padding: 10px 0; }
    .nav-toggle { display: flex; }
  }

  /* FOOTER */
  .site-footer {
    background: var(--primary);
    color: #d1d5db;
    margin-top: 60px;
  }
  .footer-container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px;
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr;
    gap: 30px;
  }
  .footer-brand h3 { color: #fff; margin: 0 0 8px; }
  .footer-brand p { margin: 0; color: var(--text-light); font-size: .9rem; }
  .footer-links h4, .footer-social h4 { color: #fff; margin: 0 0 12px; font-size: 1rem; }
  .footer-links ul { list-style: none; padding: 0; margin: 0; }
  .footer-links li { margin-bottom: 8px; }
  .footer-links a { color: #d1d5db; text-decoration: none; font-size: .92rem; }
  .footer-links a:hover { color: var(--accent); }
  .social-icons { display: flex; gap: 14px; }
  .social-icons a { color: #d1d5db; transition: color .2s; }
  .social-icons a:hover { color: var(--accent); }
  .footer-bottom {
    text-align: center;
    padding: 16px 10px;
    border-top: 1px solid rgba(255,255,255,.1);
    font-size: .85rem;
    color: var(--text-light);
  }

  @media (max-width: 768px) {
    .footer-container { grid-template-columns: 1fr; text-align: center; }
    .social-icons { justify-content: center; }
  }
</style>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
  const toggle = document.querySelector('.nav-toggle');
  const navLinks = document.querySelector('.nav-links');
  if (toggle) {
    toggle.addEventListener('click', () => navLinks.classList.toggle('open'));
  }
</script>
